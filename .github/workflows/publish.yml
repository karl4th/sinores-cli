name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set. Skipping publish."
            echo "Go to Settings > Secrets and variables > Actions and add NPM_TOKEN."
            exit 0
          fi
          npm whoami || { echo "Invalid NPM_TOKEN"; exit 0; }

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set. Aborting."
            exit 0
          fi

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          echo "Package: $PACKAGE_NAME"
          echo "Local version: $LOCAL_VERSION"

          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          echo "NPM version: $NPM_VERSION"

          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published. Skipping."
            exit 0
          fi

          echo "Fixing package.json ..."
          npm pkg fix

          echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION ..."
          npm publish --access public
